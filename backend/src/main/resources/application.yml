server:
  port: 8080

spring:
  application:
    name: fractalov-backend
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: ${FRACTALOV_DB_URL:jdbc:postgresql://localhost:5432/fractalov_dev}
    username: ${FRACTALOV_DB_USER:fractalov}
    password: ${FRACTALOV_DB_PASSWORD:fractalov_dev}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 1
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  storage:
    renders-root: ${FRACTALOV_RENDERS_ROOT:./data/renders}
  jobs:
    worker-pool-size: ${FRACTALOV_JOBS_WORKERS:1}
    poll-interval-ms: ${FRACTALOV_JOBS_POLL_MS:500}
    sse-heartbeat-seconds: ${FRACTALOV_JOBS_SSE_HEARTBEAT:15}
  ml:
    enabled: ${FRACTALOV_ML_ENABLED:true}
    url: ${FRACTALOV_ML_URL:http://localhost:9000}
    timeout-ms: ${FRACTALOV_ML_TIMEOUT_MS:10000}
  bench:
    # /bench/* compare endpoints are research-only — they expose unauthenticated
    # CPU-intensive operations and shouldn't be reachable in production. Default
    # off; flip via FRACTALOV_BENCH_ENABLED=true on a dev box for measurement runs.
    enabled: ${FRACTALOV_BENCH_ENABLED:false}

logging:
  level:
    root: INFO
    com.fractalov.backend: DEBUG
    org.flywaydb: INFO
    org.springframework.jdbc.core: INFO
